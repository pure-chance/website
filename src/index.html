<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="authors" content="Chance Addis" />
        <meta name="keywords" content="media, nuclear" />
        <title>pure-chance</title>
        <link rel="icon" type="image/x-icon" href="/public/favicon.svg" />
        <link rel="stylesheet" href="/main.css" />
        <style>
            ol {
                padding: var(--space-sm) 0 0;
                text-align: left;
            }

            ol .entry {
                margin: var(--space-sm) 0;
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }

            ol .entry:first-child {
                border-top: 1px solid var(--rule);
                padding-top: var(--space-sm);
            }

            ol .entry:last-child {
                border-bottom: 1px solid var(--rule);
                padding-bottom: var(--space-md);
            }

            .entry-meta {
                display: flex;
                align-items: baseline;
                gap: 0.8em;
                flex-shrink: 0;
                white-space: nowrap;

                & .kicker {
                    font-family: "Maple Mono", monospace;
                    font-size: var(--text-size-mono-sm);
                    letter-spacing: 0.07em;
                    color: var(--muted);
                    background-color: var(--rule);
                    border-radius: 2px;
                    padding: 0.05em 0.35em 0.08em;
                    line-height: 1.5;
                    position: relative;
                    top: -0.05em;
                }

                & time {
                    font-family: "Maple Mono", monospace;
                    font-size: var(--text-size-mono);
                    color: var(--muted);
                    white-space: nowrap;
                    flex-shrink: 0;
                }
            }

            .feed {
                font-family: "Maple Mono", monospace;
                font-size: var(--text-size-mono-sm);
                color: var(--muted);
                text-align: right;
            }
        </style>
    </head>
    <body>
        <main>
            <header>
                <p id="kicker" aria-hidden="true">archive</p>
                <h1 id="title">@pure-chance</h1>
            </header>
            <hr />
            <p>A record of thoughts by @pure-chance.</p>
            <ol reversed aria-label="Articles">
                <li class="entry">
                    <a href="/writing/youtube-metacommentary-and-authenticity/"
                        >YouTube Metacommentary and Authenticity</a
                    >
                    <span class="entry-meta">
                        <span class="kicker" aria-hidden="true">Essay</span>
                        <time datetime="2024-06-6">May 2024</time>
                    </span>
                </li>
                <li class="entry">
                    <a href="/writing/iconography-of-an-apocalypse/"
                        >Iconography of an Apocalypse</a
                    >
                    <span class="entry-meta">
                        <span class="kicker" aria-hidden="true">Essay</span>
                        <time datetime="2024-12-16">Dec 2024</time>
                    </span>
                </li>
                <li class="entry">
                    <a href="/writing/optimally-bad-wordle/">Optimally Bad Wordle</a>
                    <span class="entry-meta">
                        <span class="kicker" aria-hidden="true">Note</span>
                        <time datetime="2025-11-06">Nov 2025</time>
                    </span>
                </li>
            </ol>
            <p class="feed">RSS feed at <a href="/rss.xml">/rss.xml</a></p>
        </main>
        <footer>
            <span id="locus">@pure-chance</span>
            <a href="/about" class="endnotes"><sup>†</sup>about</a>
            <a href="/resources" class="endnotes"><sup>‡</sup>resources</a>
        </footer>
    </body>
</html>
